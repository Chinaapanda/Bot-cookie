name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build exe
        run: pyinstaller --noconfirm CookieRunBot.spec

      - name: Pack portable zip
        shell: pwsh
        run: |
          $ver = (Select-String -Path version.py -Pattern 'VERSION = "(.+)"').Matches.Groups[1].Value
          $out = "CookieRunBot-v$ver"
          New-Item -ItemType Directory -Force -Path dist/package | Out-Null
          Copy-Item -Recurse dist/CookieRunBot dist/package/$out
          Copy-Item README.md, install.bat, run.bat dist/package/$out/
          Compress-Archive -Path dist/package/$out -DestinationPath "dist/CookieRunBot-v$ver.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/CookieRunBot-v*.zip
          generate_release_notes: true
